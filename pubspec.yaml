name: pulsemarket
description: PulseMarket - Live Stocks & Crypto Tracker

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2
  candlesticks: ^2.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  http: ^1.2.0

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # ── Background execution ──────────────────────────────────────────────────
  flutter_background_service: ^5.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/